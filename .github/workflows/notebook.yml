name: notebook

# Executes reproduce.ipynb on GitHub's runners and publishes the fully-run
# notebook to GitHub Pages, so a reviewer can read the executed output
# (every expect/found/match block) without running anything locally.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt jupyter nbconvert
      - name: Execute notebook to HTML
        run: |
          jupyter nbconvert --to html --execute --output index \
            --ExecutePreprocessor.timeout=1800 reproduce.ipynb
          mkdir -p _site
          mv index.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
